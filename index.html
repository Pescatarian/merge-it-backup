<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GTO Strategy Analyzer — Supabase Integrated</title>

  <!-- Tailwind for quick styling (optional) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <!-- Supabase JS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root{
      --bg:#1a1a1a;
      --panel:#0f0f0f;
      --muted:#9ca3af;
      --accent:#10b981;
      --danger:#ef4444;
      --card:#111111;
      --glass: rgba(255,255,255,0.03);
    }
    html,body{
      height:100%;
      margin:0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      background:var(--bg);
      color:#e6eef3;
    }
    .container{
      max-width:1200px;
      margin:24px auto;
      padding:20px;
    }
    .topbar{
      display:flex;
      gap:12px;
      align-items:center;
      justify-content:space-between;
      margin-bottom:16px;
    }
    .left, .right { display:flex; gap:8px; align-items:center; }
    .btn{
      background:linear-gradient(180deg,#222 0%, #0f0f0f 100%);
      border:1px solid rgba(255,255,255,0.04);
      color:#e6eef3;
      padding:8px 12px;
      border-radius:8px;
      cursor:pointer;
      font-size:13px;
    }
    .btn.primary{ background: linear-gradient(180deg,#0b6b48,#085a3c); }
    .btn.danger{ background: linear-gradient(180deg,#7b1e21,#5a0f12); }
    .panel{
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border-radius:12px;
      padding:12px;
      border:1px solid rgba(255,255,255,0.03);
    }
    .layout{
      display:grid;
      grid-template-columns: 260px 1fr 320px;
      gap:16px;
    }
    .sidebar{
      height:calc(100vh - 190px);
      overflow:auto;
    }
    .main{
      min-height:400px;
    }
    .rightpanel{
      height:calc(100vh - 190px);
      overflow:auto;
    }
    .report-item{
      display:flex;
      justify-content:space-between;
      gap:8px;
      padding:8px;
      border-radius:8px;
      cursor:pointer;
      transition:background .12s;
    }
    .report-item:hover{ background: rgba(255,255,255,0.02); }
    .small{ font-size:12px; color:var(--muted); }
    input, textarea, select{
      background: #0b0b0b;
      border:1px solid rgba(255,255,255,0.04);
      padding:8px;
      color:#e6eef3;
      border-radius:6px;
      font-size:13px;
    }
    .modal{
      position:fixed;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      background: rgba(0,0,0,0.6);
      z-index:60;
      opacity:0;
      pointer-events:none;
      transition:opacity .12s;
    }
    .modal.active{ opacity:1; pointer-events:auto; }
    .modal-content{
      background:var(--panel);
      padding:18px;
      width:520px;
      max-width:94%;
      border-radius:12px;
      box-shadow: 0 6px 30px rgba(0,0,0,0.6);
      border:1px solid rgba(255,255,255,0.03);
    }
    .modal-header{ display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
    .close-btn{ background:transparent; border:0; color:var(--muted); cursor:pointer; font-size:20px; }
    label{ display:block; font-size:13px; color:var(--muted); margin-bottom:6px; }
    .muted{ color:var(--muted); }
    .note-area{ width:100%; min-height:140px; resize:vertical; }
    .board-list{ display:flex; flex-direction:column; gap:8px; margin-top:8px; }
    .board-btn{ text-align:left; width:100%; }
    footer.small{ text-align:center; margin-top:12px; color:var(--muted); font-size:12px; }
    .auth-button{ display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; }
    .chip{ background:rgba(255,255,255,0.03); padding:6px 8px; border-radius:999px; font-size:12px; color:var(--muted); }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="left">
        <div style="display:flex; gap:8px; align-items:center;">
          <button class="btn" onclick="createNewReport()">New Report</button>
          <button class="btn primary" onclick="saveReport()">Save Report</button>
          <button class="btn" onclick="exportReports()">Export</button>
          <button class="btn" onclick="document.getElementById('importFile').click()">Import</button>
          <input id="importFile" type="file" accept=".json" style="display:none" onchange="importReports(event)">
        </div>
      </div>

      <div style="display:flex; gap:12px; align-items:center;">
        <div class="panel" style="display:flex; gap:8px; align-items:center;">
          <label style="margin:0">Load Report</label>
          <select id="reportSelect" onchange="onSelectReport()" style="min-width:220px"></select>
          <button class="btn danger" onclick="deleteReport()">Delete</button>
        </div>

        <div class="auth-button" onclick="openAuthModal()" title="Login / Account">
          <div class="chip" id="authLabel">Login</div>
        </div>
      </div>
    </div>

    <div class="layout">
      <div class="panel sidebar">
        <h3 style="margin:0 0 8px 0">Reports</h3>
        <div id="reportsList" style="display:flex; flex-direction:column; gap:6px;"></div>
        <footer class="small">Saved locally and (optionally) synced to Supabase</footer>
      </div>

      <div class="panel main">
        <div style="display:flex; justify-content:space-between; align-items:start; gap:12px;">
          <div>
            <h2 id="reportTitle" style="margin:0">No report loaded</h2>
            <div class="small" id="reportMeta">Load or create a report to begin</div>
          </div>
          <div style="display:flex; gap:8px; align-items:center;">
            <div class="small muted">Charts</div>
          </div>
        </div>

        <div style="display:flex; gap:12px; margin-top:12px; align-items:flex-start;">
          <div style="flex:1;">
            <canvas id="distChart" height="220"></canvas>
          </div>
          <div style="width:320px;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
              <h4 style="margin:0">Boards</h4>
              <button class="btn" onclick="openBoardDetailModal()">Edit Board Details</button>
            </div>
            <div class="board-list" id="boardButtons">
              <!-- flop/turn/river buttons inserted here -->
            </div>
            <div style="margin-top:12px;">
              <label>Notes</label>
              <textarea id="globalNotes" class="note-area" placeholder="Global notes for the report..." onchange="saveGlobalNotes()"></textarea>
            </div>
          </div>
        </div>

      </div>

      <div class="panel rightpanel">
        <h3 style="margin-top:0">Report JSON</h3>
        <textarea id="reportJson" style="width:100%; height:60vh; background:transparent; border:1px dashed rgba(255,255,255,0.04); color:#dbeafe; padding:8px; font-family:monospace; font-size:13px;"></textarea>
      </div>
    </div>
  </div>

  <!-- Board Detail Modal -->
  <div id="boardModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="boardModalTitle">Board Details</h3>
        <button class="close-btn" onclick="closeBoardDetailModal()">✕</button>
      </div>

      <div>
        <label>Board</label>
        <select id="boardSelect" onchange="onBoardChange()">
          <option value="flop">Flop</option>
          <option value="turn">Turn</option>
          <option value="river">River</option>
        </select>
      </div>

      <div style="margin-top:8px;">
        <label>Notes</label>
        <textarea id="boardNotes" class="note-area" placeholder="Notes for this board..."></textarea>
      </div>

      <div style="display:flex; gap:8px; justify-content:flex-end; margin-top:12px;">
        <button class="btn" onclick="closeBoardDetailModal()">Close</button>
        <button class="btn primary" onclick="saveBoardData()">Save Board</button>
      </div>
    </div>
  </div>

  <!-- Auth Modal -->
  <div id="authModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="authModalTitle">Login / Sign Up</h3>
        <button class="close-btn" onclick="closeAuthModal()">✕</button>
      </div>

      <div id="authForm">
        <div style="margin-bottom:8px;">
          <label>Email</label>
          <input id="authEmail" type="email" placeholder="you@example.com" />
        </div>
        <div style="margin-bottom:8px;">
          <label>Password</label>
          <input id="authPassword" type="password" placeholder="min 6 chars" />
        </div>
        <div id="authError" class="small" style="min-height:16px;color:var(--danger)"></div>

        <div style="display:flex; gap:8px; justify-content:flex-end; margin-top:8px;">
          <button class="btn" onclick="handleLogin()">Login</button>
          <button class="btn primary" onclick="handleSignup()">Sign Up</button>
        </div>
      </div>

      <div id="authLoggedIn" style="display:none; text-align:center;">
        <div style="font-size:20px; color:var(--accent); margin-bottom:6px;">✓</div>
        <div id="userEmailDisplay" style="font-weight:600"></div>
        <div style="margin-top:12px;">
          <button class="btn danger" onclick="handleLogout()">Logout</button>
        </div>
      </div>
    </div>
  </div>

<script>
/* ===========================
   Supabase configuration
   =========================== */
const SUPABASE_URL = 'https://gsjqilmnwpvmdkkgnbhn.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdzanFpbG1ud3B2bWRra2duYmhuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjgwNDkzNDcsImV4cCI6MjA4MzYyNTM0N30.ZYgxp7v4huKK1_jBX7c45wGsx6I09XPkEgjjqxtJRuM'; // <-- replace with your anon key
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let currentUser = null;

/* ===========================
   Local data structures
   =========================== */
let allReports = []; // array of report objects
let activeReport = null; // currently loaded report
let boardDetailData = {}; // key: report_board -> object { notes: ... }

/* Utility */
function uid(){ return Math.random().toString(36).slice(2,9); }
function nowISO(){ return new Date().toISOString(); }

/* ===========================
   Example chart setup
   =========================== */
let distChart = null;
function initCharts(){
  const ctx = document.getElementById('distChart').getContext('2d');
  if(distChart) distChart.destroy();
  distChart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: ['Fold','Call','Raise'],
      datasets: [{
        data: [50,30,20],
        backgroundColor: ['#374151','#06b6d4','#f59e0b'],
        borderWidth:0
      }]
    },
    options: {
      plugins: {
        legend:{ position:'bottom', labels:{ color:'#cbd5e1' } }
      },
      responsive:true,
      maintainAspectRatio:false
    }
  });
}

/* ===========================
   Report management
   =========================== */

function loadLocalStorage(){
  try{
    const r = JSON.parse(localStorage.getItem('gtoReports') || '[]');
    allReports = Array.isArray(r) ? r : [];
  }catch(e){ allReports = []; }
  try{
    const b = JSON.parse(localStorage.getItem('boardDetailData') || '{}');
    boardDetailData = b && typeof b === 'object' ? b : {};
  }catch(e){ boardDetailData = {}; }
}

function persistLocal(){
  localStorage.setItem('gtoReports', JSON.stringify(allReports));
  localStorage.setItem('boardDetailData', JSON.stringify(boardDetailData));
}

function createNewReport(){
  const name = prompt('Report name', 'Untitled ' + (new Date()).toLocaleString());
  if(!name) return;
  const report = {
    id: uid(),
    name: name,
    created_at: nowISO(),
    updated_at: nowISO(),
    // sample distribution data
    distribution: { fold:50, call:30, raise:20 },
    boards: ['flop','turn','river'],
    globalNotes: '',
    metadata: { hero:'IP', villain:'OOP' }
  };
  allReports.unshift(report);
  persistLocal();
  loadReportsDropdown();
  selectReportById(report.id);
  // sync
  if(currentUser) saveReportToSupabase(report);
}

function saveReport(){
  if(!activeReport){
    alert('No active report. Create or load one first.');
    return;
  }
  // Update from inputs (global notes & title)
  const title = document.getElementById('reportTitle').innerText || activeReport.name;
  activeReport.name = title;
  activeReport.updated_at = nowISO();
  activeReport.globalNotes = document.getElementById('globalNotes').value || '';
  // update distribution from chart or editor - for demo, we'll keep chart values
  const ds = distChart.data.datasets[0].data;
  activeReport.distribution = { fold:ds[0], call:ds[1], raise:ds[2] };
  // upsert into array
  const idx = allReports.findIndex(r => r.id === activeReport.id);
  if(idx >= 0) allReports[idx] = activeReport;
  else allReports.unshift(activeReport);
  persistLocal();
  loadReportsDropdown();
  alert('✓ Saved locally');
  if(currentUser) saveReportToSupabase(activeReport);
}

function deleteReport(){
  const sel = document.getElementById('reportSelect');
  if(!sel.value){ alert('Select a report to delete'); return; }
  const rpt = allReports.find(r=>r.id===sel.value);
  if(!rpt) return;
  if(!confirm('Delete "'+rpt.name+'"? This will remove local copy and remote (if synced).')) return;
  allReports = allReports.filter(r=>r.id!==rpt.id);
  // remove board details for that report
  Object.keys(boardDetailData).forEach(k=>{
    if(k.startsWith(rpt.name + '_')) delete boardDetailData[k];
  });
  persistLocal();
  loadReportsDropdown();
  if(currentUser) deleteReportFromSupabase(rpt.name);
  displayNoData();
}

/* Export / Import */
function exportReports(){
  const payload = { reports: allReports, boardDetails: boardDetailData, exported_at: nowISO() };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'gto_reports_export_' + (new Date()).toISOString().slice(0,19).replace(/:/g,'-') + '.json';
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function importReports(e){
  const file = e.target.files && e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev){
    try{
      const obj = JSON.parse(ev.target.result);
      if(obj.reports && Array.isArray(obj.reports)){
        // merge by name - simple append with suffix if conflict
        obj.reports.forEach(r=>{
          if(allReports.some(existing => existing.name === r.name)){
            r.name = r.name + ' (imported)';
            r.id = uid();
          }
          allReports.unshift(r);
        });
      }
      if(obj.boardDetails && typeof obj.boardDetails === 'object'){
        boardDetailData = Object.assign({}, boardDetailData, obj.boardDetails);
      }
      persistLocal();
      loadReportsDropdown();
      alert('Imported successfully');
    }catch(err){ alert('Import failed: ' + err.message); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

/* UI: reports dropdown and sidebar */
function loadReportsDropdown(){
  const sel = document.getElementById('reportSelect');
  sel.innerHTML = '<option value="">-- Select report --</option>';
  const list = document.getElementById('reportsList');
  list.innerHTML = '';
  allReports.forEach(r=>{
    const opt = document.createElement('option');
    opt.value = r.id;
    opt.textContent = r.name + '  •  ' + (r.updated_at ? new Date(r.updated_at).toLocaleString() : '');
    sel.appendChild(opt);

    const row = document.createElement('div');
    row.className = 'report-item';
    row.innerHTML = '<div style="flex:1"><strong>' + r.name + '</strong><div class="small">' + (r.updated_at?new Date(r.updated_at).toLocaleString():'') + '</div></div>' +
      '<div style="display:flex; gap:6px; align-items:center"><button class="btn" onclick="selectReportById(\\''+r.id+'\\')">Open</button></div>';
    list.appendChild(row);
  });
}

function selectReportById(id){
  const rpt = allReports.find(r=>r.id===id);
  if(!rpt) return;
  activeReport = JSON.parse(JSON.stringify(rpt)); // clone
  renderActiveReport();
  // update selector
  const sel = document.getElementById('reportSelect');
  sel.value = id;
}

function onSelectReport(){
  const sel = document.getElementById('reportSelect');
  if(!sel.value) { displayNoData(); return; }
  selectReportById(sel.value);
}

function displayNoData(){
  document.getElementById('reportTitle').innerText = 'No report loaded';
  document.getElementById('reportMeta').innerText = 'Create or load a report to begin';
  document.getElementById('reportJson').value = '';
  document.getElementById('globalNotes').value = '';
  // reset chart
  if(distChart){
    distChart.data.datasets[0].data = [50,30,20];
    distChart.update();
  }
  const boardBtns = document.getElementById('boardButtons');
  boardBtns.innerHTML = '';
}

function renderActiveReport(){
  if(!activeReport) return;
  document.getElementById('reportTitle').innerText = activeReport.name;
  document.getElementById('reportMeta').innerText = 'Updated: ' + (activeReport.updated_at ? new Date(activeReport.updated_at).toLocaleString() : '');
  document.getElementById('reportJson').value = JSON.stringify(activeReport, null, 2);
  document.getElementById('globalNotes').value = activeReport.globalNotes || '';
  // chart
  const d = activeReport.distribution || {fold:50, call:30, raise:20};
  distChart.data.datasets[0].data = [d.fold||0, d.call||0, d.raise||0];
  distChart.update();
  // boards
  const boardBtns = document.getElementById('boardButtons');
  boardBtns.innerHTML = '';
  (activeReport.boards || []).forEach(b=>{
    const btn = document.createElement('button');
    btn.className = 'btn board-btn';
    btn.textContent = b.charAt(0).toUpperCase() + b.slice(1);
    btn.onclick = ()=>{ openBoardDetailModalFor(b); };
    boardBtns.appendChild(btn);
  });
}

/* Global notes save */
function saveGlobalNotes(){
  if(!activeReport) return;
  activeReport.globalNotes = document.getElementById('globalNotes').value;
  activeReport.updated_at = nowISO();
  const idx = allReports.findIndex(r=>r.id === activeReport.id);
  if(idx>=0) allReports[idx] = activeReport;
  persistLocal();
  if(currentUser) saveReportToSupabase(activeReport);
}

/* Board detail modal handling */
let currentBoardForModal = 'flop';
function openBoardDetailModal(){
  if(!activeReport){ alert('Load a report first'); return; }
  document.getElementById('boardModal').classList.add('active');
  document.getElementById('boardSelect').value = 'flop';
  onBoardChange();
}
function openBoardDetailModalFor(boardName){
  if(!activeReport){ alert('Load a report first'); return; }
  currentBoardForModal = boardName;
  document.getElementById('boardModal').classList.add('active');
  document.getElementById('boardSelect').value = boardName;
  onBoardChange();
}
function closeBoardDetailModal(){
  document.getElementById('boardModal').classList.remove('active');
}
function onBoardChange(){
  const b = document.getElementById('boardSelect').value;
  currentBoardForModal = b;
  const key = activeReport.name + '_' + b;
  const data = boardDetailData[key] || { notes: '' };
  document.getElementById('boardNotes').value = data.notes || '';
  document.getElementById('boardModalTitle').innerText = 'Board Details — ' + b;
}
function saveBoardData(){
  if(!activeReport) return;
  const notes = document.getElementById('boardNotes').value || '';
  const key = activeReport.name + '_' + currentBoardForModal;
  boardDetailData[key] = { notes: notes, updated_at: nowISO() };
  persistLocal();
  if(currentUser) saveBoardDetailToSupabase(activeReport.name, currentBoardForModal, boardDetailData[key]);
  closeBoardDetailModal();
  alert('Board notes saved');
}

/* ===========================
   Supabase auth functions
   =========================== */

async function checkAuth(){
  try{
    const { data } = await supabase.auth.getUser();
    currentUser = data.user;
    updateAuthUI();
    if(currentUser){
      // load cloud data and merge
      await loadReportsFromSupabase();
      await loadBoardDetailsFromSupabase();
      loadReportsDropdown();
    }
  }catch(err){
    console.error('Auth check error', err);
  }
}

function updateAuthUI(){
  const el = document.getElementById('authLabel');
  if(!el) return;
  if(currentUser){
    const short = currentUser.email.split('@')[0];
    el.textContent = short.length>10?short.slice(0,10)+'...':short;
    el.style.background = 'linear-gradient(90deg, rgba(16,185,129,0.12), rgba(6,182,212,0.06))';
    el.style.color = '#a7f3d0';
  } else {
    el.textContent = 'Login';
    el.style.background = '';
    el.style.color = '';
  }
  // auth modal view
  if(currentUser){
    document.getElementById('authForm').style.display = 'none';
    document.getElementById('authLoggedIn').style.display = 'block';
    document.getElementById('userEmailDisplay').innerText = currentUser.email;
  } else {
    document.getElementById('authForm').style.display = 'block';
    document.getElementById('authLoggedIn').style.display = 'none';
  }
}

function openAuthModal(){
  document.getElementById('authModal').classList.add('active');
  document.getElementById('authError').innerText = '';
  if(currentUser){
    document.getElementById('authForm').style.display = 'none';
    document.getElementById('authLoggedIn').style.display = 'block';
    document.getElementById('userEmailDisplay').innerText = currentUser.email;
  } else {
    document.getElementById('authForm').style.display = 'block';
    document.getElementById('authLoggedIn').style.display = 'none';
  }
}
function closeAuthModal(){ document.getElementById('authModal').classList.remove('active'); }

/* Login / Signup */
async function handleLogin(){
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  const errEl = document.getElementById('authError');
  errEl.style.color = 'var(--muted)';
  if(!email || !password){ errEl.innerText = 'Provide email and password'; return; }
  errEl.innerText = 'Signing in...';
  try{
    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
    if(error){ errEl.style.color = 'var(--danger)'; errEl.innerText = error.message; return; }
    currentUser = data.user;
    updateAuthUI();
    closeAuthModal();
    // load cloud
    await loadReportsFromSupabase();
    await loadBoardDetailsFromSupabase();
    loadReportsDropdown();
    alert('Signed in. Cloud data merged with local.');
  }catch(err){ console.error(err); errEl.style.color = 'var(--danger)'; errEl.innerText = err.message || 'Login failed'; }
}
async function handleSignup(){
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  const errEl = document.getElementById('authError');
  if(!email || !password){ errEl.innerText = 'Provide email and password'; return; }
  if(password.length < 6){ errEl.innerText = 'Password must be at least 6 characters'; return; }
  errEl.style.color = 'var(--muted)'; errEl.innerText = 'Creating account...';
  try{
    const { data, error } = await supabase.auth.signUp({ email, password });
    if(error){ errEl.style.color = 'var(--danger)'; errEl.innerText = error.message; return; }
    errEl.style.color = 'var(--accent)'; errEl.innerText = 'Account created. Check email to confirm, then login.';
  }catch(err){ console.error(err); errEl.style.color = 'var(--danger)'; errEl.innerText = err.message || 'Signup failed'; }
}
async function handleLogout(){
  await supabase.auth.signOut();
  currentUser = null;
  updateAuthUI();
  // optionally clear local copies or keep them; here we keep local but clear UI
  alert('Signed out');
}

/* ===========================
   Supabase sync functions
   =========================== */

async function saveReportToSupabase(report){
  if(!currentUser) return;
  try{
    const payload = {
      user_id: currentUser.id,
      name: report.name,
      data: report,
      updated_at: nowISO()
    };
    const { error } = await supabase.from('reports').upsert(payload, { onConflict: 'user_id,name' });
    if(error) console.error('saveReportToSupabase error', error);
    else console.log('Saved report to Supabase:', report.name);
  }catch(err){ console.error('saveReportToSupabase exception', err); }
}

async function loadReportsFromSupabase(){
  if(!currentUser) return;
  try{
    const { data, error } = await supabase.from('reports').select('*').eq('user_id', currentUser.id);
    if(error){ console.error('loadReportsFromSupabase error', error); return; }
    if(Array.isArray(data) && data.length){
      // merge: if local doesn't have the same name -> add. If same name -> keep local (local wins)
      data.forEach(row=>{
        try{
          const rpt = row.data;
          if(!allReports.some(r => r.name === rpt.name)){
            // ensure we have an id
            rpt.id = uid();
            allReports.push(rpt);
          }
        }catch(e){console.error(e);}
      });
      persistLocal();
      console.log('Loaded reports from cloud:', data.length);
    }
  }catch(err){ console.error('loadReportsFromSupabase exception', err); }
}

async function deleteReportFromSupabase(reportName){
  if(!currentUser) return;
  try{
    const { error } = await supabase.from('reports').delete().eq('user_id', currentUser.id).eq('name', reportName);
    if(error) console.error('deleteReportFromSupabase error', error);
    else console.log('Deleted report from cloud:', reportName);
  }catch(err){ console.error(err); }
}

async function saveBoardDetailToSupabase(reportName, boardName, data){
  if(!currentUser) return;
  try{
    const payload = {
      user_id: currentUser.id,
      report_name: reportName,
      board_name: boardName,
      data: data,
      updated_at: nowISO()
    };
    const { error } = await supabase.from('board_details').upsert(payload, { onConflict: 'user_id,report_name,board_name' });
    if(error) console.error('saveBoardDetailToSupabase error', error);
    else console.log('Saved board detail to cloud:', reportName, boardName);
  }catch(err){ console.error(err); }
}

async function loadBoardDetailsFromSupabase(){
  if(!currentUser) return;
  try{
    const { data, error } = await supabase.from('board_details').select('*').eq('user_id', currentUser.id);
    if(error){ console.error('loadBoardDetailsFromSupabase error', error); return; }
    if(Array.isArray(data) && data.length){
      data.forEach(row=>{
        const key = row.report_name + '_' + row.board_name;
        boardDetailData[key] = row.data;
      });
      persistLocal();
      console.log('Loaded board details from cloud:', data.length);
    }
  }catch(err){ console.error(err); }
}

async function deleteBoardDetailFromSupabase(reportName, boardName){
  if(!currentUser) return;
  try{
    const { error } = await supabase.from('board_details').delete().eq('user_id', currentUser.id).eq('report_name', reportName).eq('board_name', boardName);
    if(error) console.error('deleteBoardDetailFromSupabase error', error);
  }catch(err){ console.error(err); }
}
